<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>StudyTrack</title>

  <!-- CSS -->

  <link rel="stylesheet"
        href="style.css">

  <!-- PWA -->

  <link rel="manifest"
        href="manifest.json">

</head>

<body>

  <!-- HEADER -->

  <header>

    <h1>
      StudyTrack
    </h1>

    <p>
      Complete Educational Roadmaps
      From Class 9 To Master Degree
    </p>

  </header>

  <!-- SEARCH SECTION -->

  <section class="topBar">

    <input type="text"
           id="searchInput"
           placeholder="Search Courses...">

    <button onclick="searchCourse()">
      Search
    </button>

  </section>

  <!-- COURSE SELECTOR -->

  <section class="selector">

    <select id="courseSelect">

      <option value="">
        Select Course
      </option>

      <!-- SCHOOL -->

      <option value="class9">
        Class 9 Mathematics
      </option>

      <option value="class10">
        Class 10 Mathematics
      </option>

      <option value="pcm11">
        Class 11 PCM
      </option>

      <option value="commerce11">
        Class 11 Commerce
      </option>

      <option value="pcm12">
        Class 12 PCM
      </option>

      <option value="commerce12">
        Class 12 Commerce
      </option>

      <!-- BACHELOR -->

      <option value="bca">
        BCA
      </option>

      <option value="btech">
        BTech
      </option>

      <option value="bba">
        BBA
      </option>

      <option value="bcom">
        BCom
      </option>

      <option value="iit">
        IIT Preparation
      </option>

      <!-- MASTER -->

      <option value="mca">
        MCA
      </option>

      <option value="mba">
        MBA
      </option>

      <option value="mtech">
        MTech
      </option>

      <option value="mcom">
        MCom
      </option>

    </select>

    <button onclick="showRoadmap()">
      Show Roadmap
    </button>

  </section>

  <!-- ROADMAP SECTION -->

  <section id="roadmapContainer">

    <!-- Dynamic Roadmap Data -->

  </section>

  <!-- CONTACT SECTION -->

  <section class="contact">

    <h2>
      Contact StudyTrack
    </h2>

    <input type="text"
           id="name"
           placeholder="Enter Your Name">

    <input type="email"
           id="email"
           placeholder="Enter Your Email">

    <textarea id="message"
              placeholder="Write Your Message"></textarea>

    <button onclick="sendMessage()">
      Send Message
    </button>

  </section>

  <!-- FOOTER -->

  <footer>

    <p>
      © 2026 StudyTrack | Built By Sanju
    </p>

  </footer>

  <!-- ROADMAP DATA -->

  <script src="roadmapData.js"></script>

  <!-- MAIN SCRIPT -->

  <script src="script.js"></script>

  <!-- FIREBASE -->

  <script type="module"
          src="firebase.js"></script>

  <!-- SERVICE WORKER -->

  <script>

    if("serviceWorker" in navigator){

      navigator.serviceWorker
      .register("service-worker.js")

      .then(() => {

        console.log(
          "Service Worker Registered"
        );

      })

      .catch(error => {

        console.log(error);

      });
    }

  </script>

</body>
</html>
